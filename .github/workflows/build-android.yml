name: Build & Release Android APK + AAB

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: sdkmanager "platforms;android-36" "build-tools;36.0.0"

      - name: Sync Capacitor
        run: npx cap sync android

      # ── Signing ──────────────────────────────────────────────────────────────
      # Always produces a signed release build.
      # - If KEYSTORE_BASE64 secret exists → decodes and uses it (consistent sig)
      # - If not → generates a new keystore, signs with it, and prints the
      #   base64 in the Job Summary so you can save it as a secret for next time.
      - name: Set up signing keystore
        run: |
          KS="$HOME/naijarights.keystore"

          if [ -n "$KEYSTORE_B64" ]; then
            echo "✅ Using stored keystore from secret"
            echo "$KEYSTORE_B64" | base64 --decode > "$KS"
          else
            echo "⚠️  No KEYSTORE_BASE64 secret found — generating a new keystore"
            keytool -genkey -v \
              -keystore "$KS" \
              -alias naijarights \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" \
              -keypass   "$KS_PASS" \
              -dname "CN=NaijaRights,O=NaijaRights,C=NG" \
              -noprompt

            B64=$(base64 -w 0 "$KS")
            echo "## ⚠️ Save this keystore as a GitHub Secret"           >> $GITHUB_STEP_SUMMARY
            echo ""                                                        >> $GITHUB_STEP_SUMMARY
            echo "Go to **Settings → Secrets → Actions** and add:"        >> $GITHUB_STEP_SUMMARY
            echo ""                                                        >> $GITHUB_STEP_SUMMARY
            echo "| Secret | Value |"                                     >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|"                                      >> $GITHUB_STEP_SUMMARY
            echo "| \`KEYSTORE_BASE64\` | (see code block below) |"       >> $GITHUB_STEP_SUMMARY
            echo "| \`KEYSTORE_STORE_PASSWORD\` | \`$KS_PASS\` |"         >> $GITHUB_STEP_SUMMARY
            echo "| \`KEYSTORE_KEY_ALIAS\` | \`naijarights\` |"           >> $GITHUB_STEP_SUMMARY
            echo "| \`KEYSTORE_KEY_PASSWORD\` | \`$KS_PASS\` |"           >> $GITHUB_STEP_SUMMARY
            echo ""                                                        >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`"                                                  >> $GITHUB_STEP_SUMMARY
            echo "$B64"                                                    >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`"                                                  >> $GITHUB_STEP_SUMMARY
          fi

          echo "KEYSTORE_PATH=$KS"          >> $GITHUB_ENV
          echo "KEYSTORE_STORE_PASSWORD=$KS_PASS" >> $GITHUB_ENV
          echo "KEYSTORE_KEY_ALIAS=naijarights"   >> $GITHUB_ENV
          echo "KEYSTORE_KEY_PASSWORD=$KS_PASS"   >> $GITHUB_ENV
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KS_PASS: ${{ secrets.KEYSTORE_STORE_PASSWORD || 'NaijaRights2025!' }}

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Clear Gradle cache
        run: rm -rf ~/.gradle/caches

      - name: Build signed release APK + AAB
        run: |
          # Derive versionCode from run number (auto-increments) and
          # versionName from the git tag (strips leading 'v')
          VERSION_NAME="${{ github.ref_name }}"
          VERSION_NAME="${VERSION_NAME#v}"          # strip leading 'v'
          [ -z "$VERSION_NAME" ] && VERSION_NAME="1.0"

          cd android
          ./gradlew assembleRelease bundleRelease --no-daemon \
            --refresh-dependencies \
            -PversionCode=${{ github.run_number }} \
            -PversionName="$VERSION_NAME"

      - name: Rename outputs
        run: |
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="dev-$(date +%Y%m%d)"

          cp android/app/build/outputs/apk/release/app-release.apk "NaijaRights-${VERSION}.apk"
          cp android/app/build/outputs/apk/release/app-release.apk "NaijaRights-latest.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "NaijaRights-${VERSION}.aab"

          echo "APK_PATH=NaijaRights-${VERSION}.apk" >> $GITHUB_ENV
          echo "AAB_PATH=NaijaRights-${VERSION}.aab" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}"              >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-AAB
          path: ${{ env.AAB_PATH }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "NaijaRights ${{ env.APK_VERSION }}"
          body: |
            ## NaijaRights ${{ env.APK_VERSION }}

            ### 📲 Install on Android (APK)
            1. Download **${{ env.APK_PATH }}** below
            2. On your phone: **Settings → Security → Install unknown apps**
            3. Open the `.apk` and tap **Install**

            ### 🏪 Google Play Store (AAB)
            Download **${{ env.AAB_PATH }}** and upload it in Google Play Console.

            ---
            📊 Download count tracked automatically by GitHub.
          files: |
            ${{ env.APK_PATH }}
            NaijaRights-latest.apk
            ${{ env.AAB_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
