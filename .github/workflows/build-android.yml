name: Build & Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required to create GitHub Releases and upload assets
permissions:
  contents: write

# Opt all actions into Node.js 24 now (avoids deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / npm ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Build Next.js static export ──────────────────────────────────────
      - name: Build static export (generates out/)
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      # ── 4. Java (required by Gradle) ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 6. Capacitor sync ────────────────────────────────────────────────────
      - name: Sync Capacitor (copies out/ → android assets)
        run: npx cap sync android

      # ── 7. Build APK ─────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK + AAB
        run: |
          cd android
          ./gradlew assembleDebug bundleDebug --no-daemon

      # ── 8. Rename outputs ─────────────────────────────────────────────────────
      - name: Rename outputs
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/master" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "NaijaRights-${VERSION}.apk"
          cp android/app/build/outputs/bundle/debug/app-debug.aab \
             "NaijaRights-${VERSION}.aab"
          echo "APK_PATH=NaijaRights-${VERSION}.apk" >> $GITHUB_ENV
          echo "AAB_PATH=NaijaRights-${VERSION}.aab" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      # ── 9. Upload as workflow artifacts ──────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-AAB
          path: ${{ env.AAB_PATH }}
          retention-days: 30

      # ── 10. Create GitHub Release (only on version tags) ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "NaijaRights ${{ env.APK_VERSION }}"
          body: |
            ## NaijaRights ${{ env.APK_VERSION }}

            ### 📲 Install directly on Android (APK)
            1. Download **${{ env.APK_PATH }}** below
            2. On your phone go to **Settings → Security** and enable **"Install unknown apps"**
            3. Open the downloaded `.apk` and tap **Install**

            ### 🏪 Google Play Store (AAB)
            Download **${{ env.AAB_PATH }}** and upload it in the Google Play Console.

            > APK = direct sideload install · AAB = Play Store upload
            > Tested on Android 10+.

            ---
            📊 Download count tracked automatically by GitHub.
          files: |
            ${{ env.APK_PATH }}
            ${{ env.AAB_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
