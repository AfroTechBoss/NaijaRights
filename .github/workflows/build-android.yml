name: Build & Release Android APK + AAB

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-apk:
    name: Build Android APK + AAB
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node ──────────────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Next.js static export ─────────────────────────────────────────────
      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      # ── 4. Java ──────────────────────────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 6. Capacitor sync ────────────────────────────────────────────────────
      - name: Sync Capacitor
        run: npx cap sync android

      # ── 7. Signing keystore (only when secret is set) ────────────────────────
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode \
            > "${{ github.workspace }}/naijarights-release.keystore"
          echo "KEYSTORE_PATH=${{ github.workspace }}/naijarights-release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_STORE_PASSWORD=${{ secrets.KEYSTORE_STORE_PASSWORD }}"    >> $GITHUB_ENV
          echo "KEYSTORE_KEY_ALIAS=${{ secrets.KEYSTORE_KEY_ALIAS }}"              >> $GITHUB_ENV
          echo "KEYSTORE_KEY_PASSWORD=${{ secrets.KEYSTORE_KEY_PASSWORD }}"        >> $GITHUB_ENV
          echo "BUILD_TYPE=release"                                                 >> $GITHUB_ENV

      - name: Set build type to debug (no keystore)
        if: ${{ secrets.KEYSTORE_BASE64 == '' }}
        run: echo "BUILD_TYPE=debug" >> $GITHUB_ENV

      # ── 8. Build ─────────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build APK + AAB
        run: |
          cd android
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew assembleRelease bundleRelease --no-daemon
          else
            ./gradlew assembleDebug bundleDebug --no-daemon
          fi

      # ── 9. Collect outputs ───────────────────────────────────────────────────
      - name: Locate and rename outputs
        run: |
          VERSION="${{ github.ref_name }}"
          [ -z "$VERSION" ] && VERSION="dev-$(date +%Y%m%d)"

          if [ "$BUILD_TYPE" = "release" ]; then
            APK_SRC="android/app/build/outputs/apk/release/app-release.apk"
            AAB_SRC="android/app/build/outputs/bundle/release/app-release.aab"
          else
            APK_SRC="android/app/build/outputs/apk/debug/app-debug.apk"
            AAB_SRC="android/app/build/outputs/bundle/debug/app-debug.aab"
          fi

          cp "$APK_SRC" "NaijaRights-${VERSION}.apk"
          cp "$AAB_SRC" "NaijaRights-${VERSION}.aab"

          echo "APK_PATH=NaijaRights-${VERSION}.apk" >> $GITHUB_ENV
          echo "AAB_PATH=NaijaRights-${VERSION}.aab" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}"              >> $GITHUB_ENV

      # ── 10. Artifacts ────────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-AAB
          path: ${{ env.AAB_PATH }}
          retention-days: 30

      # ── 11. GitHub Release ───────────────────────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "NaijaRights ${{ env.APK_VERSION }}"
          body: |
            ## NaijaRights ${{ env.APK_VERSION }}

            ### 📲 Install directly on Android (APK)
            1. Download **${{ env.APK_PATH }}** below
            2. Go to **Settings → Security** → enable **"Install unknown apps"**
            3. Open the `.apk` and tap **Install**

            ### 🏪 Google Play Store (AAB)
            Download **${{ env.AAB_PATH }}** and upload it in the Google Play Console.

            > Signed: ${{ env.BUILD_TYPE == 'release' && '✅ Release keystore' || '⚠️ Debug keystore (add KEYSTORE_BASE64 secret for release signing)' }}

            ---
            📊 Download count tracked automatically by GitHub.
          files: |
            ${{ env.APK_PATH }}
            ${{ env.AAB_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
