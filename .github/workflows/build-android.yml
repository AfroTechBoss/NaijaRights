name: Build & Release Android APK

# Triggers:
#   1. Push a version tag (e.g. git tag v1.0.0 && git push origin v1.0.0)
#      → builds APK and creates a public GitHub Release with the APK attached
#   2. Manual run from GitHub Actions tab (for testing)
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Source code ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node / npm ───────────────────────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      # ── 3. Build Next.js static export ──────────────────────────────────────
      - name: Build static export (generates out/)
        run: npm run build
        env:
          # If you've added a PostHog key as a GitHub Secret, it gets baked in here
          NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      # ── 4. Java (required by Gradle) ─────────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # ── 5. Android SDK ───────────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform & build-tools
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # ── 6. Capacitor sync ─────────────────────────────────────────────────────
      - name: Sync Capacitor (copies out/ → android assets)
        run: npx cap sync android

      # ── 7. Build APK ─────────────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      # ── 8. Rename APK to a friendly name ─────────────────────────────────────
      - name: Rename APK
        run: |
          VERSION="${{ github.ref_name }}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "refs/heads/master" ]; then
            VERSION="dev-$(date +%Y%m%d)"
          fi
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             "NaijaRights-${VERSION}.apk"
          echo "APK_PATH=NaijaRights-${VERSION}.apk" >> $GITHUB_ENV
          echo "APK_VERSION=${VERSION}" >> $GITHUB_ENV

      # ── 9. Upload APK as workflow artifact (always, even without a tag) ──────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: NaijaRights-APK
          path: ${{ env.APK_PATH }}
          retention-days: 30

      # ── 10. Create GitHub Release (only on version tags) ─────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: "NaijaRights ${{ env.APK_VERSION }}"
          body: |
            ## NaijaRights ${{ env.APK_VERSION }}

            ### 📲 How to install on Android
            1. Download **${{ env.APK_PATH }}** below
            2. On your Android phone open **Settings → Security** (or Privacy) and enable **"Install unknown apps"** / **"Unknown sources"**
            3. Open the downloaded `.apk` file and tap **Install**
            4. Open NaijaRights and know your rights!

            > This is a direct-install (sideload) APK — no Play Store needed.
            > Tested on Android 10+.

            ---
            📊 Download count is tracked automatically by GitHub.
          files: ${{ env.APK_PATH }}
          token: ${{ secrets.GITHUB_TOKEN }}
