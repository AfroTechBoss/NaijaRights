name: Generate Signing Keystore (run once)

# Run this ONCE manually to generate your keystore.
# After it finishes, copy the values from the Job Summary into GitHub Secrets.
# Never run it again — use the same keystore forever for all future releases.
on:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    name: Generate Keystore
    runs-on: ubuntu-latest

    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore naijarights-release.keystore \
            -alias naijarights \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_STORE_PASSWORD || 'changeme123' }}" \
            -keypass   "${{ secrets.KEYSTORE_STORE_PASSWORD || 'changeme123' }}" \
            -dname "CN=NaijaRights, OU=Mobile, O=NaijaRights, L=Lagos, S=Lagos, C=NG"

      - name: Output base64 to Job Summary (admins only)
        run: |
          B64=$(base64 -w 0 naijarights-release.keystore)
          echo "## 🔑 Keystore generated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Add these as **GitHub Secrets** (Settings → Secrets → Actions):" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Secret name | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_BASE64\` | \`${B64}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_STORE_PASSWORD\` | the password you set (default: \`changeme123\` — **change this first**) |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_KEY_ALIAS\` | \`naijarights\` |" >> $GITHUB_STEP_SUMMARY
          echo "| \`KEYSTORE_KEY_PASSWORD\` | same as KEYSTORE_STORE_PASSWORD |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ⚠️ Keep \`KEYSTORE_BASE64\` secret. Anyone with it can sign apps as NaijaRights." >> $GITHUB_STEP_SUMMARY
